<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/styles/atom-one-dark.min.css" integrity="sha512-Jk4AqjWsdSzSWCSuQTfYRIF84Rq/eV0G2+tu07byYwHcbTGfdmLrHjUSwvzp5HvbiqK4ibmNwdcG49Y5RGYPTg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.4.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Your Docs</title>
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="container py-5">
            <h1 class="display-5 text-center mb-5 title">Your Documentation</h1>
            <div class="row mb-3">
                <div class="col-md-8 m-auto d-flex justify-content-center">
                    <a class="btn text-white fw-bold me-2 bg-html" href="#" role="button">HTML</a>
                    <a class="btn text-white fw-bold me-2 bg-css" href="#" role="button">CSS</a>
                    <a class="btn text-black fw-bold me-2 bg-javascript" href="#" role="button">Javascript</a>
                    <a class="btn text-white fw-bold me-2 bg-php" href="#" role="button">PHP</a>
                </div>
            </div>
            <div class="row">
                <div class="col-md-8 m-auto">
                    <form action="" method="get">
                        <input id="keyword" class="form-control" aria-label="Search" type="search" name="keyword" placeholder="Search Title" autocomplete="off" autofocus>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="row html-docs">
            <div class="col-md-3">
                <div class="card h-100">
                    <div class="card-body">
                        <h4 class="card-title"><a data-bs-toggle="modal" data-bs-target="#HTML-Introduction">HTML Introduction</a></h4>
                        <p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
                        <div class="modal fade" id="HTML-Introduction" tabindex="-1" aria-labelledby="HTML-IntroductionLabel" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h5 class="modal-title" id="HTML-IntroductionLabel">HTML Introduction</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
